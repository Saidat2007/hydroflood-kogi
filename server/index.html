<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report a Flood/Drainage Issue - Hydroflood Kogi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-lg shadow-lg p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-600 mb-2">Hydroflood Kogi</h1>
            <p class="text-gray-600">Report a Flood/Drainage Issue</p>
        </div>

            <form id="reportForm" class="space-y-6" enctype="multipart/form-data" action="http://localhost:5000/api/reports" method="post">
                <!-- Location Field -->
                <div>
                <label for="location" class="block text-sm font-medium text-gray-700 mb-2">
                    Location
                </label>
                <input
                    type="text"
                    id="location"
                    name="location"
                    placeholder="Enter affected location"
                    required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                />
                </div>

                <!-- Issue Type Dropdown -->
                <div>
                <label for="issueType" class="block text-sm font-medium text-gray-700 mb-2">
                    Issue Type
                </label>
                <select
                    id="issueType"
                    name="issueType"
                    required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                >
                  <option value="" disabled selected>Select an issue type</option>
                  <option value="Flash Flood">Flash Flood</option>
                  <option value="River Overflow">River Overflow</option>
                  <option value="Blocked Drainage">Blocked Drainage</option>
                  <option value="Heavy Rainfall">Heavy Rainfall</option>
                </select>
                </div>

                <!-- Description Field -->
                <div>
                <label for="description" class="block text-sm font-medium text-gray-700 mb-2">
                    Description
                </label>
                <textarea
                    id="description"
                    name="description"
                    placeholder="Provide detailed description of the issue"
                    rows="4"
                    required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition resize-none"
                ></textarea>
                </div>

                <!-- Image Upload Field -->
                <div>
                <label for="image" class="block text-sm font-medium text-gray-700 mb-2">
                    Upload Image
                </label>
                <input
                    type="file"
                    id="image"
                    name="image"
                    accept="image/*"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                />
                </div>

                <!-- Submit Button -->
                <button
                type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200 ease-in-out transform hover:scale-105"
                >
                Submit Report
                </button>
            </form>

        <!-- Status Message -->
        <div id="statusMessage" class="mt-4 hidden p-4 rounded-lg text-center text-sm font-medium"></div>
    </div>

<script>
    async function sendReportFormData(e) {
        // 1. Instantly lock the browser down so it cannot abort the connection!
        e.preventDefault(); 

        const formElement = document.getElementById('reportForm');
        const formData = new FormData(formElement);

        try {
            const response = await fetch('http://localhost:5000/api/reports', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                alert('Report submitted successfully! 🎉');
                window.location.href = 'admin.html';
            } else {
                const errorData = await response.json();
                alert(`Submission failed: ${errorData.message}`);
            }
        } catch (error) {
            console.error('Error submitting:', error);
            alert('Something went wrong connecting to the server.');
        }
    }
</script>
</body>
</html>
