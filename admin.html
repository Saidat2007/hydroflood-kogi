<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HydroFlood Kogi - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">
    <div class="max-w-6xl mx-auto">
        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
    <h2 class="text-xl font-bold mb-4">Send Flood Alert</h2>
    <div id="smsSection" class="bg-white p-6 rounded-lg shadow-md mb-8">
    <h2 class="text-xl font-bold mb-4 text-gray-800">Send Flood Alert</h2>
    
    <form id="alertForm" class="flex flex-col gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Location</label>
            <input type="text" id="alertLocation" placeholder="e.g., Lokoja" 
                   class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700">Alert Message</label>
            <textarea id="alertMessage" rows="3" placeholder="Type your warning here..." 
                      class="w-full mt-1 p-2 border border-gray-300 rounded-md"></textarea>
        </div>

        <button type="submit" 
                class="bg-red-600 text-white py-2 px-4 rounded-md hover:bg-red-700 transition duration-200 font-semibold">
            Send SMS Alert
        </button>
    </form>
</div>

</div>
       <div class="flex flex-col md:flex-row md:items-center md:justify-between border-b border-gray-200 pb-4 mb-6">
    <div>
        <h1 class="text-3xl font-bold text-blue-900">Flood Reports Dashboard</h1>
        <p id="welcomeUser" class="text-sm text-gray-500 mt-1 font-medium"></p>
    </div>
    
    <div class="flex items-center gap-4 mt-4 md:mt-0">
        <div class="bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-200 flex items-center gap-3">
            <span class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></span>
            <p class="text-sm font-medium text-gray-700">
                Active Reports: <span id="reportCount" class="font-bold text-blue-900 text-lg">0</span>
            </p>
        </div>

        <button onclick="handleLogout()" class="bg-gray-800 hover:bg-gray-900 text-white text-sm font-semibold px-4 py-2.5 rounded-lg transition duration-200 shadow-sm">
            Log Out
        </button>
    </div>
</div>
        <div id="reportsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    </div>

    <script>
    const API_URL = window.location.hostname === 'localhost' 
        ? 'http://localhost:5000' 
        : 'https://hydroflood-kogi-1.onrender.com';

        // Auth Guard: Kick out users if no login token exists
if (!localStorage.getItem('token')) {
    window.location.href = 'login.html';
}
// Display logged-in Admin's name dynamically
window.addEventListener('DOMContentLoaded', () => {
    const adminData = localStorage.getItem('adminUser');
    if (adminData) {
        const user = JSON.parse(adminData);
        document.getElementById('welcomeUser').textContent = `Welcome back, ${user.name}`;
    }
});

// Logout Handler function
function handleLogout() {
    // Clear credentials completely from storage
    localStorage.removeItem('token');
    localStorage.removeItem('adminUser');
    
    // Boot back to login screen immediately
    window.location.href = 'login.html';
}
async function fetchReports() {
    try {
        const response = await fetch(`${API_URL}/api/reports`);
        if (!response.ok) throw new Error('Failed to fetch');
        const reports = await response.json();
        console.log("Full Report Data:, reports);")

        // 1. Update the count here, using the correct variable
        const countElement = document.getElementById('reportCount');
        if (countElement) {
            countElement.innerText = reports.length;
        }

        // 2. Clear existing grid
        const reportsGrid = document.getElementById('reportsGrid');
        reportsGrid.innerHTML = ''; 

        // 3. Populate the grid
        reports.forEach(report => {
            const card = document.createElement('div');
            card.className = 'bg-white p-4 rounded-lg shadow-md';
            card.innerHTML = `
                <h3 class="font-bold text-xl">${report.issueType || 'Untitled Report'}</h3>
                <p><strong>Type:</strong> ${report.issueType}</p>
                <p><strong>Location:</strong> ${report.location}</p>
                <label class="block mt-2 font-semibold">Status:</label>
                <select onchange="updateStatus('${report._id}', this.value)">
                    <option value="Pending" ${report.status === 'Pending' ? 'selected' : ''}>Pending</option>
                    <option value="Investigating" ${report.status === 'Investigating' ? 'selected' : ''}>Investigating</option>
                    <option value="Resolved" ${report.status === 'Resolved' ? 'selected' : ''}>Resolved</option>
                </select>
                <img src="${API_URL}/uploads/${report.image}" class="mt-4 w-full h-48 object-cover">
            `;
            reportsGrid.appendChild(card);
        });
    } catch (err) {
        console.error('Error fetching reports:', err);
    }
}

// Crucial: Call the function when the page loads
document.addEventListener('DOMContentLoaded', fetchReports);

async function deleteReport(id) {
    if (confirm('Are you sure you want to delete this report?')) {
        try {
            // Grab the token from localStorage
            const token = localStorage.getItem('token');

            const response = await fetch(`${API_URL}/api/reports/${id}`, {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem}` // Passing the token to the server!
                }
            });

            if (response.ok) {
                fetchReports(); // Refresh cards instantly
            } else {
                const data = await response.json();
                alert(data.message || 'Failed to delete the report.');
            }
        } catch (error) {
            console.error('Error sending delete request:', error);
        }
    }
}
async function updateStatus(reportId, newStatus) {
    try {
        const response = await fetch(`${API_URL}/api/reports/${reportId}/status`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: newStatus })
        });
        
        if (response.ok) {
            alert('Status updated successfully!');
            fetchReports(); // Refresh the list
        } else {
            alert('Failed to update status.');
        }
    } catch (err) {
        console.error('Error updating status:', err);
    }
}
document.getElementById('alertForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
        location: document.getElementById('alertLocation').value,
        message: document.getElementById('alertMessage').value
    };

    const res = await fetch('http://localhost:5000/api/alerts/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });

    if (res.ok) alert('Alert sent successfully!');
    else alert('Error: Could not send alert.');
});           
 
        window.onload = fetchReports;
    </script>
</body>
</html>
