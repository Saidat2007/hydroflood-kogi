<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HydroFlood Kogi - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">
    <div class="max-w-6xl mx-auto">
       <div class="flex flex-col md:flex-row md:items-center md:justify-between border-b border-gray-200 pb-4 mb-6">
    <div>
        <h1 class="text-3xl font-bold text-blue-900">Flood Reports Dashboard</h1>
        <p id="welcomeUser" class="text-sm text-gray-500 mt-1 font-medium"></p>
    </div>
    
    <div class="flex items-center gap-4 mt-4 md:mt-0">
        <div class="bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-200 flex items-center gap-3">
            <span class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></span>
            <p class="text-sm font-medium text-gray-700">
                Active Reports: <span id="reportCount" class="font-bold text-blue-900 text-lg">0</span>
            </p>
        </div>

        <button onclick="handleLogout()" class="bg-gray-800 hover:bg-gray-900 text-white text-sm font-semibold px-4 py-2.5 rounded-lg transition duration-200 shadow-sm">
            Log Out
        </button>
    </div>
</div>
        <div id="reportsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        // Auth Guard: Kick out users if no login token exists
if (!localStorage.getItem('token')) {
    window.location.href = 'login.html';
}
// Display logged-in Admin's name dynamically
window.addEventListener('DOMContentLoaded', () => {
    const adminData = localStorage.getItem('adminUser');
    if (adminData) {
        const user = JSON.parse(adminData);
        document.getElementById('welcomeUser').textContent = `Welcome back, ${user.name}`;
    }
});

// Logout Handler function
function handleLogout() {
    // Clear credentials completely from storage
    localStorage.removeItem('token');
    localStorage.removeItem('adminUser');
    
    // Boot back to login screen immediately
    window.location.href = 'login.html';
}
        async function fetchReports() {
            try {
                const response = await fetch('http://localhost:5000/api/reports');
                const reports = await response.json();
                
                const reportsGrid = document.getElementById('reportsGrid');
                const reportCount = document.getElementById('reportCount');
                
                reportsGrid.innerHTML = ''; 
                // Dynamically update the count badge text!
                reportCount.textContent = reports.length;

                if (reports.length === 0) {
                    reportsGrid.innerHTML = '<p class="text-gray-500 text-lg col-span-3">No reports found.</p>';
                    return;
                }

                reports.forEach(report => {
                    const card = document.createElement('div');
                    card.className = 'bg-white p-4 rounded-lg shadow-md border border-gray-200 flex flex-col justify-between';
                    
                    const imageUrl = report.image ? `http://localhost:5000/${report.image.replace(/\\/g, '/')}` : 'https://via.placeholder.com/150';

                    card.innerHTML = `
                        <div>
                            <img src="${imageUrl}" alt="Incident Image" class="w-full h-48 object-cover rounded-md mb-4">
                            <span class="text-xs font-semibold uppercase px-2 py-1 bg-blue-100 text-blue-800 rounded">
                                ${report.issueType}
                            </span>
                            <h3 class="text-lg font-bold text-gray-800 mt-2">${report.location}</h3>
                            <p class="text-gray-600 text-sm mt-1">${report.description}</p>
                            <p class="text-xs text-gray-400 mt-3">Submitted on: ${new Date(report.createdAt).toLocaleDateString()}</p>
                        </div>
                        <button onclick="deleteReport('${report._id}')" class="mt-4 w-full bg-red-500 hover:bg-red-600 text-white text-sm font-medium py-2 rounded transition duration-200">
                            Delete Report
                        </button>
                    `;
                    
                    reportsGrid.appendChild(card);
                });
            } catch (error) {
                console.error('Error fetching reports:', error);
                document.getElementById('reportsGrid').innerHTML = '<p class="text-red-500">Error loading reports.</p>';
            }
        }

async function deleteReport(id) {
    if (confirm('Are you sure you want to delete this report?')) {
        try {
            // Grab the token from localStorage
            const token = localStorage.getItem('token');

            const response = await fetch(`http://localhost:5000/api/reports/${id}`, {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}` // Passing the token to the server!
                }
            });

            if (response.ok) {
                fetchReports(); // Refresh cards instantly
            } else {
                const data = await response.json();
                alert(data.message || 'Failed to delete the report.');
            }
        } catch (error) {
            console.error('Error sending delete request:', error);
        }
    }
}

        window.onload = fetchReports;
    </script>
</body>
</html>
