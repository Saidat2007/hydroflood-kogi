<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydroflood Kogi - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen">
        <!-- Header -->
        <header class="bg-blue-600 text-white shadow">
            <div class="max-w-7xl mx-auto px-4 py-6">
                <h1 class="text-3xl font-bold">Hydroflood Kogi</h1>
                <p class="text-blue-100">Flood Monitoring & Reporting Dashboard</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 py-8">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Flood Reports</h2>
                <p class="text-gray-600">Real-time flood incidents and alerts</p>
            </div>

            <!-- Loading State -->
            <div id="loading" class="text-center py-12">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                <p class="mt-4 text-gray-600">Loading reports...</p>
            </div>

            <!-- Reports Grid -->
            <div id="reportsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            </div>

            <!-- Error State -->
            <div id="error" class="hidden bg-red-50 border border-red-200 rounded-lg p-6 text-center">
                <p class="text-red-600">Failed to load reports. Please try again later.</p>
            </div>
        </main>
    </div>

    <script>
        async function fetchReports() {
            const loadingDiv = document.getElementById('loading');
            const container = document.getElementById('reportsContainer');
            const errorDiv = document.getElementById('error');

            try {
                const response = await fetch('http://localhost:5000/api/reports/');
                if (!response.ok) throw new Error('Failed to fetch reports');
                
                const reports = await response.json();
                
                loadingDiv.classList.add('hidden');
                container.classList.remove('hidden');
                
container.innerHTML = reports.map(report => `
  <div class="bg-white rounded-lg shadow hover:shadow-lg transition">
    <div class="p-6">
      <h3 class="text-lg font-semibold text-gray-800">${report.issueType || 'N/A'}</h3>
      <span class="px-3 py-1 rounded-full text-sm font-medium ${getStatusColor(report.status)}">
        ${report.status || 'Unknown'}
      </span>
      <p class="text-gray-600 mb-4">${report.description || 'No description'}</p>
      <p class="text-sm text-gray-500"><strong>Location:</strong> ${report.location}</p>
      
      <img src="${API_URL}/uploads/${report.image}" alt="Report Image" class="mt-4 w-full h-48 object-cover rounded">
    </div>
  </div>
`).join(''); // Ensure you have .join('') at the end!
            } catch (err) {
                loadingDiv.classList.add('hidden');
                errorDiv.classList.remove('hidden');
            }
        }

        function getStatusColor(status) {
            const statusMap = {
                'resolved': 'bg-green-100 text-green-800',
                'in-progress': 'bg-yellow-100 text-yellow-800',
                'pending': 'bg-blue-100 text-blue-800',
                'critical': 'bg-red-100 text-red-800'
            };
            return statusMap[status?.toLowerCase()] || 'bg-gray-100 text-gray-800';
        }

        // Fetch reports on page load
        window.addEventListener('DOMContentLoaded', fetchReports);
    </script>
</body>
</html>
